<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b" />
            <stop offset="100%" stop-color="#0B1121" />
        </linearGradient>
        <!-- Sun Glow Effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Base Rounded App Shape -->
    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    
    <!-- Subtle TV/Screen Bezel Inner Border -->
    <rect x="56" y="56" width="400" height="400" rx="72" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="20 40" opacity="0.15"/>
    
    <!-- Glowing Sun -->
    <circle cx="266" cy="210" r="90" fill="#f59e0b" filter="url(#glow)"/>
    <circle cx="266" cy="210" r="70" fill="#fcd34d"/>
    
    <!-- Modern Cloud -->
    <path d="M160 360 a60 60 0 0 1 0 -120 a80 80 0 0 1 150 -20 a60 60 0 0 1 50 140 z" fill="#ffffff" opacity="0.95"/>
    <path d="M160 360 a60 60 0 0 1 0 -120 a80 80 0 0 1 150 -20 a60 60 0 0 1 50 140 z" fill="none" stroke="#e2e8f0" stroke-width="6"/>
</svg>